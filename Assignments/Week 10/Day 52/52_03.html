<!DOCTYPE html>
<html>
<head>
    <title>ClearDebt Loan Calculator</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5">

<h2 class="mb-4">ClearDebt Loan Calculator</h2>

<form onsubmit="calculateEMI(); return false;">

<div class="row">

<div class="col-md-4">
<label>Loan Amount</label>
<input type="text" id="amount" class="form-control">
</div>

<div class="col-md-4">
<label>Interest Rate (% per year)</label>
<input type="text" id="rate" class="form-control">
</div>

<div class="col-md-4">
<label>Months</label>
<input type="text" id="months" class="form-control">
</div>

</div>

<br>

<div class="text-center mt-3">
    <button type="submit" class="btn btn-primary">Calculate</button>
</div>
</form>

<br>

<table class="table table-bordered">
<thead class="table-dark">
<tr>
<th>SNO</th>
<th>Loan Left</th>
<th>EMI</th>
<th>Principal</th>
<th>Interest</th>
<th>Remaining Balance</th>
</tr>
</thead>

<tbody id="scheduleBody"></tbody>

</table>

</div>

<script>

function calculateEMI()
{
    let P = parseFloat(document.getElementById("amount").value);
    let annualRate = parseFloat(document.getElementById("rate").value);
    let n = parseInt(document.getElementById("months").value);

    let r = (annualRate / 100) / 12;

    let emi = P * r * Math.pow(1+r, n) / (Math.pow(1+r, n) - 1);

    let balance = P;

    let tbody = document.getElementById("scheduleBody");
    tbody.innerHTML = "";

    for(let i=1;i<=n;i++)
    {
        let interest = balance * r;
        let principal = emi - interest;
        let remaining = balance - principal;

        let row = `<tr>
        <td>${i}</td>
        <td>${balance.toFixed(2)}</td>
        <td>${emi.toFixed(2)}</td>
        <td>${principal.toFixed(2)}</td>
        <td>${interest.toFixed(2)}</td>
        <td>${remaining.toFixed(2)}</td>
        </tr>`;

        tbody.innerHTML += row;

        balance = remaining;
    }
}

</script>

</body>
</html>
