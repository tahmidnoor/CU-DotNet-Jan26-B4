<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sum of Two Numbers</title>

<script>
function validate(box){

    let result = document.getElementById("result");

    if(box.value === ""){
        box.style.backgroundColor = "red";
        result.value = "Error";
        result.style.backgroundColor = "orange";
        return;
    }

    if(isNaN(box.value)){
        box.style.backgroundColor = "yellow";
        result.value = "Error";
        result.style.backgroundColor = "orange";
        return;
    }

    box.style.backgroundColor = "white";

    let v1 = document.getElementById("num1").value;
    let v2 = document.getElementById("num2").value;

    if(v1 !== "" && v2 !== "" && !isNaN(v1) && !isNaN(v2)){
        result.value = Number(v1) + Number(v2);
        result.style.backgroundColor = "white";
    }
}
</script>

</head>

<body>

<h2>Sum of Two Numbers</h2>

<input type="text" id="num1" onblur="validate(this)">

<span> + </span>

<input type="text" id="num2" onblur="validate(this)">

<span> = </span>

<input type="text" id="result" readonly>

</body>
</html>
