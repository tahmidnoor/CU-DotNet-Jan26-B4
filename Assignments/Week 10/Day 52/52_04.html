<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <img id="bulb" src="./Images/lightoff.jpg">
    <br><br>
   
    <button onclick ="lightOn()">Light On</button>
    <button onclick ="lightOff()">Light Off</button>
    <script>
        function lightOn(){
            document.getElementById("bulb").src="./Images/lighton.jpg";
        }
        function lightOff(){
            document.getElementById("bulb").src="./Images/lightoff.jpg";
        }
    </script>
</body>
</html>
